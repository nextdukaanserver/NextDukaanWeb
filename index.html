      "telephone": "+91-9999999999",

      "priceRange": "₹₹",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Cash, UPI, Bank Transfer",
      "areaServed": {
        "@type": "Country",
        "name": "India"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN",
        "addressRegion": "Delhi NCR"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "09:00",
        "closes": "19:00"
      },
      "sameAs": [
        "https://nextdukaan.in"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Development",
              "description": "Professional websites for Indian businesses in 5-10 days"
            },
            "price": "4999",
            "priceCurrency": "INR"
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Reels & Social Media",
              "description": "Viral reels and social media content for businesses"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SEO & Google Ranking",
              "description": "Get found on Google with professional SEO services"
            }
          }
        ]

    <!-- ✅ SCHEMA MARKUP — WebSite (Enables Google Sitelinks Search) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NextDukaan",
      "url": "https://nextdukaan.in",
      "description": "Websites, Reels & SEO for Indian Businesses",
      "inLanguage": "en-IN",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://nextdukaan.in/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ✅ SCHEMA MARKUP — FAQPage (Rich Snippets in Google) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does a website cost at NextDukaan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our websites start at ₹4,999 and are delivered in 5–10 days. We offer web development, reels, SEO and full digital growth packages."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build a website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NextDukaan delivers professional websites in just 5–10 business days, including design, development and launch."
          }

        {
